<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>신정원 - 사용자등록</title>
    <style>
        fieldset {
            margin-bottom: 20px; padding: 15px;
        }
    </style>
</head>
<body>
    <header>
        <h1>사용자 등록 신청서</h1>
    </header>
    <main>
        <form action="#" method="post">
        <fieldset>
            <legend>기본 정보(Essential)</legend>
            <label for="id">아이디:</label>
            <input type="text" id="id" name="id" placeholder="4~12자 영문/숫자" required><br><br>
            
            <label for="pw">비밀번호:</label>
            <input type="password" id="pw" name="pw" required><br><br>
          
            <label for="email">이메일:</label>
            <input type="email" id="email" name="email" required><br><br>
        </fieldset>
    
    <fieldset>
        <legend>부가 정보 (Optional)</legend>
        <label for="phone">연락처:</label>
        <input type="tel" id="phone" name="phone" placeholder="010-1234-5678" pattern="[0-9]{2,3}-[0-9]{3,4}-[0-9]{4}"><br><br>  
        
        <label>관심 분야: </label><br>
        <input type="checkbox" id="html5" name="interest" value="HTML5">
        <label for="html5">HTML5</label><br>

        <input type="checkbox" id="css3" name="interest" value="CSS3">
        <label for="css3">CSS3</label><br>

        <input type="checkbox" id="javascript" name="interest" value="JavaScript">
        <label for="javascript">JavaScript</label><br>

         <label for="userskill">숙련도:</label>
         <input type="range" id="userskill" name="userskill" min="1" max="10" step="1" value="5">
    </fieldset>

    <input type="submit" value="가입 신청">
    <input type="reset" value="초기화">

</main>
<footer>
    <p><a href="index.html">홈으로</a></p>
<p>&copy; 2026 Web Programming Course All rights reserved.</p>
</body>
</html>
